name: Static site CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required website files
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          grep -qi '<!doctype html' index.html
          grep -qi '<title>' index.html
          grep -qi '</html>' index.html

      - name: Check for unresolved merge markers
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' --exclude-dir=.git .; then
            echo 'Unresolved merge markers found.'
            exit 1
          fi

      - name: Verify internal section links
        shell: bash
        run: |
          set -euo pipefail
          for id in home about experience projects skills contact; do
            grep -q "id=\"$id\"" index.html
          done
